services:
  # PostgreSQL Database
  - type: pserv
    name: broker-db
    runtime: docker
    repo: https://github.com/yourusername/your-repo  # Replace with your repo
    dockerfilePath: Dockerfile.db
    plan: starter
    env:
      - key: POSTGRES_USER
        value: broker_user
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: broker_db

  # Django Backend
  - type: web
    name: broker-backend
    runtime: python
    region: ohio  # Change to your preferred region
    plan: starter
    buildCommand: |
      pip install -r backend/requirements.txt
      cd backend/core && python manage.py migrate && python manage.py collectstatic --noinput && python create_admin.py
    startCommand: cd backend/core && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        value: ${REDIS_URL}  # Set manually in Render dashboard
      - key: GROQ_API_KEY
        value: ${GROQ_API_KEY}  # Set manually in Render dashboard
      - key: SERPAPI_API_KEY
        value: ${SERPAPI_API_KEY}  # Set manually in Render dashboard
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true  # Render generates a strong password
      - key: ADMIN_EMAIL
        value: admin@example.com  # Change this
      - key: DATABASE_URL
        fromDatabase:
          name: broker-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://${FRONTEND_NAME}.onrender.com  # Will be set after frontend deployment

  # React Frontend
  - type: web
    name: broker-frontend
    runtime: node
    region: ohio  # Change to match backend region
    plan: starter
    buildCommand: cd frontend && npm install && npm run build
    staticSiteDir: frontend/dist
    env:
      - key: VITE_API_URL
        value: https://${BACKEND_NAME}.onrender.com/api

envVars:
  - key: RENDER_EXTERNAL_HOSTNAME
    fromService:
      name: broker-backend
      property: host
